    <section>
    <h2>Únete al Fan Club de BTS 💜</h2>

<form class="formulario">
  
  <label>Nombre completo:</label>
  <input type="text" name="nombre" placeholder="Escribe tu nombre" required>

  <label>Email:</label>
  <input type="email" name="email" placeholder="correo@gmail.com" required>

  <label>Edad:</label>
  <input type="number" name="edad" min="10" max="100">

  <label>Miembro favorito:</label>
  <select name="favorito">
    <option>RM</option>
    <option>Jin</option>
    <option>Suga</option>
    <option>J-Hope</option>
    <option>Jimin</option>
    <option>V</option>
    <option>Jungkook</option>
  </select>

  <label>¿Desde cuándo eres ARMY?</label>
  <input type="date" name="fecha">

  <label>Género musical favorito:</label>
  <div>
    <input type="radio" name="genero"> Pop
    <input type="radio" name="genero"> Hip-Hop
    <input type="radio" name="genero"> K-pop
  </div>

  <label>¿Qué te gusta de BTS?</label>
  <div>
    <input type="checkbox"> Música
    <input type="checkbox"> Coreografías
    <input type="checkbox"> Personalidad
  </div>

  <label>Mensaje:</label>
  <textarea name="mensaje" rows="4" placeholder="Escribe tu opinión..."></textarea>

  <button type="submit">Enviar 💜</button>
<br>
    <img src="../img/gif bts2.gif" alt=""> 
</form>
